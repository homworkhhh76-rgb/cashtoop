<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>إرسال إشعارات Cash Top</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><style>*{box-sizing:border-box}body{font-family:Cairo,'Segoe UI',sans-serif;background:#f0f2f5;margin:0;padding:20px;display:flex;justify-content:center;color:#1e293b}.dashboard{background:#fff;padding:26px;border-radius:14px;box-shadow:0 8px 25px rgba(0,0,0,.1);width:100%;max-width:600px;border-top:5px solid #1555b7}.head{display:flex;justify-content:space-between;align-items:center;gap:10px}.head img{width:58px;height:58px;object-fit:contain;border-radius:10px}.dashboard h2{color:#1555b7;margin:0}.form-group{margin-top:15px}.form-group label{display:block;margin-bottom:5px;font-weight:800;font-size:13px}.form-group input,.form-group textarea{width:100%;padding:11px;border:1px solid #cbd5e1;border-radius:8px;font:inherit}.form-group textarea{min-height:92px;resize:vertical}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.send-btn,.back{width:100%;padding:13px;font-size:15px;border:none;border-radius:8px;cursor:pointer;font-weight:800;margin-top:18px;text-decoration:none;text-align:center;display:block}.send-btn{color:#fff;background:#1555b7}.back{background:#f8fafc;color:#475569;border:1px solid #cbd5e1}.note{font-size:11px;line-height:1.8;color:#64748b;background:#f8fafc;border-radius:8px;padding:10px;margin-top:14px}.status{margin-top:12px;font-size:12px;font-weight:800}.status.ok{color:#008d4c}.status.err{color:#c23321}@media(max-width:560px){body{padding:10px}.dashboard{padding:18px}.grid{grid-template-columns:1fr}}</style><script src="push-config.js"></script><script>try{const s=JSON.parse(localStorage.getItem('cashtop_superadmin_session')||'null');if(!s||Number(s.expiresAt||0)<=Date.now())location.replace('admin.html')}catch(_){location.replace('admin.html')}</script></head><body><div class="dashboard"><div class="head"><div><h2>إرسال إشعار مخصص</h2><div style="font-size:11px;color:#64748b">إشعار Push عابر — لا يتم حفظ محتوى الإشعار كسجل.</div></div><img src="notification-icon.png" alt="Cash Top"></div><div class="form-group"><label>عنوان الإشعار</label><input id="notifTitle" value="تحديث جديد من Cash Top"></div><div class="form-group"><label>نص الإشعار</label><textarea id="notifBody">تم إضافة ميزات جديدة للنظام، اكتشفها الآن.</textarea></div><div class="grid"><div class="form-group"><label>رابط الأيقونة المصغرة</label><input id="notifIcon" value="notification-icon.png" dir="ltr"></div><div class="form-group"><label>رابط الصورة الكبيرة (اختياري)</label><input id="notifImage" placeholder="https://..." dir="ltr"></div></div><div class="form-group"><label>الرابط عند الضغط على الإشعار</label><input id="mainUrl" value="index.html" dir="ltr"></div><div class="form-group"><label>مفتاح إرسال Push الخاص بالإدارة</label><input id="pushAdminKey" type="password" autocomplete="off" placeholder="لا يتم حفظه في قاعدة البيانات"></div><button class="send-btn" id="sendBtn"><i class="fa-solid fa-paper-plane"></i> إطلاق الإشعار</button><div id="status" class="status"></div><div class="note">يصل الإشعار لكل جهاز سبق أن منح صلاحية الإشعارات وسجّل Push Subscription، حتى لو لم يكن المستخدم مسجل دخول. يلزم تشغيل API الـ Push المرفق وضبط VAPID ومفتاح الإدارة على الخادم.</div><a class="back" href="admin.html">العودة إلى لوحة الإدارة</a></div><script>const $=id=>document.getElementById(id);$('sendBtn').addEventListener('click',async()=>{const btn=$('sendBtn'),status=$('status');btn.disabled=true;status.className='status';status.textContent='جاري الإرسال...';try{const base=String(window.CASHTOP_PUSH?.apiBase||'').replace(/\/$/,'');if(!base)throw new Error('Push API غير مضبوط');const r=await fetch(base+'/send',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+$('pushAdminKey').value},body:JSON.stringify({title:$('notifTitle').value||'إشعار جديد',body:$('notifBody').value||'',icon:$('notifIcon').value||'notification-icon.png',badge:$('notifIcon').value||'notification-icon.png',image:$('notifImage').value||'',url:$('mainUrl').value||'index.html'})});const data=await r.json().catch(()=>({}));if(!r.ok)throw new Error(data.error||'تعذر إرسال الإشعار');status.className='status ok';status.textContent=`تم إرسال الإشعار إلى ${data.sent||0} جهاز. تم حذف ${data.removed||0} اشتراك منتهي.`}catch(e){status.className='status err';status.textContent=e.message||'حدث خطأ'}finally{btn.disabled=false}});</script></body></html>
