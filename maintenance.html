<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>صيانة النظام - كاش توب</title><link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><style>*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:Cairo,sans-serif;background:radial-gradient(circle at 80% 10%,#ede9fe 0,transparent 32%),linear-gradient(145deg,#f8fafc,#eef2ff);color:#1e293b;display:grid;place-items:center;padding:20px}.card{width:min(620px,100%);background:rgba(255,255,255,.96);border:1px solid #e2e8f0;border-radius:24px;padding:34px 24px;text-align:center;box-shadow:0 25px 70px rgba(49,46,129,.14)}.icon{width:92px;height:92px;margin:auto;background:#ede9fe;color:#5e5296;border-radius:28px;display:grid;place-items:center;font-size:42px}.gear{animation:pulse 2s ease-in-out infinite}@keyframes pulse{50%{transform:rotate(8deg) scale(1.05)}}h1{font-size:28px;margin:20px 0 8px}p{color:#64748b;line-height:2;margin:0 auto;max-width:470px}.status{display:inline-flex;gap:8px;align-items:center;margin-top:22px;padding:9px 14px;background:#f8fafc;border-radius:999px;font-size:12px;font-weight:700}.dot{width:9px;height:9px;background:#f59e0b;border-radius:50%;box-shadow:0 0 0 6px rgba(245,158,11,.12)}small{display:block;margin-top:18px;color:#94a3b8}@media(max-width:600px){.card{padding:28px 18px;border-radius:20px}h1{font-size:23px}.icon{width:78px;height:78px;font-size:35px}}</style></head><body><main class="card"><div class="icon"><i class="fa-solid fa-screwdriver-wrench gear"></i></div><h1>النظام تحت الصيانة</h1><p>نعمل حالياً على تحسين كاش توب لضمان أداء أفضل. سيتم التحقق تلقائياً، وبمجرد انتهاء الصيانة ستتمكن من تسجيل الدخول من جديد دون الحاجة لتحديث الصفحة.</p><div class="status"><span class="dot"></span><span id="statusText">جاري التحقق من حالة النظام...</span></div><small>يمكنك إبقاء هذه الصفحة مفتوحة.</small></main><script src="firebase-config.js"></script><script>(function(){const cfg=window.CASHTOP_FIREBASE||{},base=String(cfg.config?.databaseURL||'').replace(/\/+$/,''),root=String(cfg.rootPath||'cashTopExchange/cashTopPOS').replace(/^\/+|\/+$/g,''),isMongo=['mongodb-http-api','mongodb-rtdb-api'].includes(cfg.backendMode)||/\/api\/rtdb/.test(base);const tenant=new URLSearchParams(location.search).get('tenant')||'';function safe(v){return String(v||'').replace(/[.#$\[\]\/]/g,'_')}function url(){const path=`${root}/${safe(tenant)}/datasets/cashtop_company_access`;return isMongo?`${base}?path=${encodeURIComponent(path)}`:`${base}/${path}.json`}function decode(v){let x=v;for(let i=0;i<3&&typeof x==='string';i++){try{x=JSON.parse(x)}catch(_){break}}if(x&&typeof x==='object'&&'value'in x)x=decode(x.value);return x||{}}async function check(){if(!tenant){document.getElementById('statusText').textContent='بانتظار انتهاء الصيانة...';return}try{const r=await fetch(url(),{cache:'no-store'});if(!r.ok)throw new Error();const a=decode(await r.json());if(a.maintenanceMode!==true){document.getElementById('statusText').textContent='انتهت الصيانة، جاري فتح تسجيل الدخول...';setTimeout(()=>location.replace('صفحة تسجيل الدخول.html'),700)}else document.getElementById('statusText').textContent='الصيانة مستمرة — يتم التحقق تلقائياً'}catch(_){document.getElementById('statusText').textContent='تعذر التحقق الآن، ستتم إعادة المحاولة تلقائياً'}}check();setInterval(check,2500)})();</script></body></html>
