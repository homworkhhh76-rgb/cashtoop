<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إشعارات Cash Top</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f9;
            margin: 0;
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            color: #fff;
            background-color: #007bff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>

    <button onclick="sendAdvancedNotification()">إرسال إشعار بصورة</button>

    <script>
        // 1. تسجيل الـ Service Worker عند تحميل الصفحة
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
            .then(() => console.log("تم تسجيل Service Worker بنجاح"))
            .catch(err => console.error("فشل التسجيل:", err));
        }

        // 2. دالة إرسال الإشعار
        function sendAdvancedNotification() {
            Notification.requestPermission().then(permission => {
                if (permission === 'granted') {
                    // استخدام Service Worker لعرض الإشعار (إلزامي للهواتف)
                    navigator.serviceWorker.ready.then(registration => {
                        registration.showNotification("تنبيه من Cash Top 🎉", {
                            body: "هذا النص الخاص بالإشعار، والصورة موجودة بالأسفل!",
                            icon: "https://cdn-icons-png.flaticon.com/512/843/843260.png", // الأيقونة الصغيرة
                            image: "https://images.unsplash.com/photo-1556742049-0cfed4f6a45d?w=500", // الصورة الكبيرة داخل الإشعار
                            vibrate: [200, 100, 200], // اهتزاز الجهاز (للهواتف)
                            badge: "https://cdn-icons-png.flaticon.com/512/843/843260.png"
                        });
                    });
                } else {
                    alert("لم يتم السماح بالإشعارات.");
                }
            });
        }
    </script>

</body>
</html>
