<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة إشعارات Cash Top</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .dashboard {
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
        }
        .dashboard h2 {
            text-align: center;
            color: #0044cc;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }
        .form-group input[type="text"], .form-group input[type="file"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }
        .send-btn {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            color: #fff;
            background-color: #0044cc;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
            transition: background-color 0.3s;
        }
        .send-btn:hover {
            background-color: #003399;
        }
        .warning-note {
            background-color: #fff3cd;
            color: #856404;
            padding: 10px;
            border-radius: 6px;
            font-size: 14px;
            margin-bottom: 15px;
            border: 1px solid #ffeeba;
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <h2>إرسال إشعار مخصص</h2>
        
        <div class="warning-note">
            ⚠️ <b>ملاحظة:</b> هذه النسخة تعمل بملف واحد. الأزرار غير مدعومة هنا، وقد تختلف استجابة الجوال مقارنة بالكمبيوتر.
        </div>
        
        <div class="form-group">
            <label>عنوان الإشعار:</label>
            <input type="text" id="notifTitle" placeholder="مثال: خصم جديد في المتجر!" value="تحديث جديد من Cash Top">
        </div>

        <div class="form-group">
            <label>نص الإشعار:</label>
            <input type="text" id="notifBody" placeholder="اكتب تفاصيل الإشعار هنا..." value="تم إضافة ميزات جديدة للنظام، اكتشفها الآن.">
        </div>

        <div class="form-group">
            <label>صورة الإشعار (اختياري - من الجهاز):</label>
            <input type="file" id="notifImage" accept="image/*">
        </div>

        <div class="form-group">
            <label>الرابط عند الضغط على الإشعار:</label>
            <input type="text" id="mainUrl" placeholder="https://..." value="https://google.com">
        </div>

        <button class="send-btn" onclick="buildAndSendNotification()">إطلاق الإشعار 🚀</button>
    </div>

    <script>
        async function buildAndSendNotification() {
            // 1. التحقق من دعم المتصفح
            if (!('Notification' in window)) {
                alert("متصفحك لا يدعم الإشعارات.");
                return;
            }

            // 2. طلب الصلاحية إذا لم يتم منحها
            let permission = Notification.permission;
            if (permission === 'default' || permission === 'prompt') {
                permission = await Notification.requestPermission();
            }

            if (permission === 'denied') {
                alert("❌ لقد قمت برفض الإشعارات مسبقاً. يرجى تفعيلها من إعدادات المتصفح.");
                return;
            }

            if (permission !== 'granted') {
                alert("لم يتم منح الصلاحية للإشعارات.");
                return;
            }

            // 3. جلب البيانات من الحقول
            const title = document.getElementById('notifTitle').value || 'إشعار جديد';
            const body = document.getElementById('notifBody').value || '';
            const mainUrl = document.getElementById('mainUrl').value;
            
            // 4. معالجة الصورة المرفوعة من الجهاز
            const imageFile = document.getElementById('notifImage').files[0];
            let imageUrl = null;
            if (imageFile) {
                imageUrl = URL.createObjectURL(imageFile);
            }

            // 5. بناء الإشعار وعرضه
            try {
                const notification = new Notification(title, {
                    body: body,
                    icon: '1000085180.png', // أيقونة كاش توب المرفقة
                    image: imageUrl // الصورة الكبيرة
                });

                // 6. التعامل مع حدث الضغط على الإشعار لفتح الرابط
                notification.onclick = function(event) {
                    event.preventDefault(); // منع السلوك الافتراضي
                    if (mainUrl) {
                        window.open(mainUrl, '_blank'); // فتح الرابط في نافذة جديدة
                    }
                    notification.close(); // إغلاق الإشعار بعد الضغط عليه
                };

            } catch (error) {
                alert("حدث خطأ أثناء عرض الإشعار. تذكر أنه على بعض أجهزة الجوال، قد يُطلب ملف Service Worker منفصل. الخطأ: " + error.message);
            }
        }
    </script>
</body>
</html>
