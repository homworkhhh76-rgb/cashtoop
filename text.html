<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة إشعارات Cash Top</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .dashboard {
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
        }
        .dashboard h2 {
            text-align: center;
            color: #0044cc;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }
        .form-group input[type="text"], .form-group input[type="file"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }
        .send-btn {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            color: #fff;
            background-color: #0044cc;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
            transition: background-color 0.3s;
        }
        .send-btn:hover {
            background-color: #003399;
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <h2>إرسال إشعار مخصص</h2>
        
        <div class="form-group">
            <label>عنوان الإشعار:</label>
            <input type="text" id="notifTitle" placeholder="مثال: خصم جديد في المتجر!" value="تحديث جديد من Cash Top">
        </div>

        <div class="form-group">
            <label>نص الإشعار:</label>
            <input type="text" id="notifBody" placeholder="اكتب تفاصيل الإشعار هنا..." value="تم إضافة ميزات جديدة للنظام، اكتشفها الآن.">
        </div>

        <div class="form-group">
            <label>الأيقونة المصغرة (لتبديل حرف الـ C):</label>
            <input type="file" id="notifIcon" accept="image/*">
        </div>

        <div class="form-group">
            <label>الصورة الكبيرة داخل الإشعار (اختياري):</label>
            <input type="file" id="notifImage" accept="image/*">
        </div>

        <div class="form-group">
            <label>الرابط عند الضغط على الإشعار:</label>
            <input type="text" id="mainUrl" placeholder="https://..." value="https://google.com">
        </div>

        <button class="send-btn" onclick="buildAndSendNotification()">إطلاق الإشعار 🚀</button>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
            .then(() => console.log("تم تسجيل ملف sw.js بنجاح"))
            .catch(err => console.error("فشل تسجيل sw.js:", err));
        }

        async function buildAndSendNotification() {
            if (!('Notification' in window)) {
                alert("متصفحك لا يدعم الإشعارات.");
                return;
            }

            let permission = Notification.permission;
            if (permission === 'default' || permission === 'prompt') {
                permission = await Notification.requestPermission();
            }

            if (permission === 'denied') {
                alert("لقد قمت برفض الإشعارات مسبقاً. يرجى تفعيلها من إعدادات المتصفح.");
                return;
            }

            const title = document.getElementById('notifTitle').value || 'إشعار جديد';
            const body = document.getElementById('notifBody').value || '';
            const mainUrl = document.getElementById('mainUrl').value;
            
            // معالجة الأيقونة المصغرة (لإزالة حرف C)
            const iconFile = document.getElementById('notifIcon').files[0];
            let iconUrl = 'https://cdn-icons-png.flaticon.com/512/843/843260.png'; // أيقونة افتراضية في حال لم ترفع صورة
            if (iconFile) {
                iconUrl = URL.createObjectURL(iconFile);
            }

            // معالجة الصورة الكبيرة
            const imageFile = document.getElementById('notifImage').files[0];
            let imageUrl = null;
            if (imageFile) {
                imageUrl = URL.createObjectURL(imageFile);
            }

            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.ready.then(registration => {
                    registration.showNotification(title, {
                        body: body,
                        icon: iconUrl, // هنا يتم تحديد الأيقونة بدلاً من حرف C
                        badge: iconUrl,
                        image: imageUrl,
                        data: {
                            url: mainUrl
                        }
                    }).catch(err => alert("حدث خطأ أثناء عرض الإشعار: " + err));
                });
            } else {
                alert("Service Worker غير مدعوم في متصفحك.");
            }
        }
    </script>
</body>
</html>
